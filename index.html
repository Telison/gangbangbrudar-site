<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gangbangbrudar</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#0d0d0d;
    color:#f2f2f2;
    font-family:Arial,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    min-height:100svh;
    padding:24px;
    text-align:center;
}

.container{
    max-width:700px;
    width:100%;
    padding:clamp(24px, 8vw, 40px);
}

.logo-heading{
    margin:0 0 clamp(28px, 6vw, 48px);
}

.logo{
    display:block;
    width:min(100%, 520px);
    height:auto;
    margin:0 auto;
}

p{
    color:#bbbbbb;
    font-size:clamp(1rem, 4vw, 1.2rem);
    line-height:1.5;
    margin:0;
}
</style>
</head>

<body>
<div class="container">
    <h1 class="logo-heading">
        <img class="logo" src="assets/images/logo.svg" alt="Gangbangbrudar">
    </h1>
    <p>Nya föreställningar i september. Mer information kommer snart.</p>
</div>
</body>
</html>
