<!doctype html>
<html lang="sv">
<head>

<title>Gangbangbrudar</title>

<style>
*{

}

body{
    margin:0;
    background:#0d0d0d;
    color:#f2f2f2;
    font-family:Arial,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;

    overflow-wrap:normal;
    hyphens:manual;
}

p{
    color:#bbbbbb;
    font-size:clamp(1rem, 4vw, 1.2rem);
    line-height:1.5;
    margin:0;
}
</style>
</head>

<body>
<div class="container">
